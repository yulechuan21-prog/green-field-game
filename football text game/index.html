<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>绿茵纪元：AI无限驱动版</title>
<style>
    :root {
        --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
        --accent-green: #10b981; --accent-gold: #fbbf24; --accent-blue: #3b82f6; --border-color: #334155;
    }
    body { font-family: 'PingFang SC', sans-serif; background-color: #000; color: var(--text-main); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
    .screen { width: 100%; max-width: 375px; height: 100%; background-color: var(--bg-dark); border: 1px solid var(--border-color); display: none; flex-direction: column; overflow-y: auto; position: relative; }
    .screen.active { display: flex; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .top-bar { background: rgba(15, 23, 42, 0.95); padding: 15px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10; text-align: center; font-weight: bold; }
    .feed-container { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 15px; }
    
    /* 表单输入样式 */
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
    .input-group label { font-size: 13px; color: var(--text-sub); }
    .input-group input, .input-group select { background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 6px; font-size: 15px; outline: none; }
    .input-group input:focus { border-color: var(--accent-blue); }

    /* AI 动态输出区 */
    .ai-log-panel { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; line-height: 1.6; font-size: 14px; min-height: 250px; overflow-y: auto; }
    
    .btn { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 15px; border-radius: 8px; text-align: left; font-size: 14px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; display: block; width: 100%; box-sizing: border-box; }
    .btn:hover:not(:disabled) { border-color: var(--accent-green); background: rgba(16,185,129,0.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; }
    .btn-primary { background-color: var(--accent-green); color: #000; font-weight: bold; text-align: center; border: none; }
    
    /* 加载动画 */
    .loader { display: none; text-align: center; padding: 20px; color: var(--accent-gold); font-size: 14px; }
    .loader.active { display: block; }
</style>
</head>
<body>

<div id="screen-create" class="screen active">
    <div class="top-bar" style="color: var(--accent-gold);">缔造传奇纪元</div>
    <div class="feed-container">
        <div class="input-group">
            <label>球员姓名</label>
            <input type="text" id="p-name" placeholder="例如：余乐川" value="余乐川">
        </div>
        <div class="input-group">
            <label>国籍</label>
            <input type="text" id="p-nation" placeholder="例如：中国" value="中国">
        </div>
        <div class="input-group">
            <label>场上位置</label>
            <select id="p-position">
                <option value="全能前锋">全能前锋</option>
                <option value="中场指挥官">中场指挥官</option>
                <option value="铁血中卫">铁血中卫</option>
            </select>
        </div>
        <div class="input-group">
            <label>初始核心能力 (1-99)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="p-pac" placeholder="速度" value="75" style="width: 33%;">
                <input type="number" id="p-sho" placeholder="射门" value="60" style="width: 33%;">
                <input type="number" id="p-phy" placeholder="身体" value="55" style="width: 33%;">
            </div>
        </div>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="startGame()">踏上绿茵场 ⚽</button>
    </div>
</div>

<div id="screen-game" class="screen">
    <div class="top-bar">
        <span id="ui-player-name">球员名</span> | 状态：<span style="color:var(--accent-green);">体能充沛</span>
    </div>
    <div class="feed-container" style="padding-bottom: 80px;">
        
        <div id="story-log" class="ai-log-panel">
            [系统初始化中...]
        </div>

        <div id="loading" class="loader">
            🤖 AI 引擎推演中，请稍候...
        </div>

        <div id="dynamic-options" style="margin-top: 15px;">
            </div>

    </div>
</div>

<script>
    // 玩家全局状态面板
    let playerState = {
        name: '', nation: '', position: '', pac: 0, sho: 0, phy: 0, 
        history: [] // 记录玩家选过的历史，让AI有记忆！
    };

    function switchScreen(targetScreenId) {
        document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
        document.getElementById(targetScreenId).classList.add('active');
    }

    // 1. 收集玩家输入并开启第一回合
    function startGame() {
        playerState.name = document.getElementById('p-name').value || '无名小卒';
        playerState.nation = document.getElementById('p-nation').value || '未知';
        playerState.position = document.getElementById('p-position').value;
        playerState.pac = document.getElementById('p-pac').value;
        playerState.sho = document.getElementById('p-sho').value;
        playerState.phy = document.getElementById('p-phy').value;

        document.getElementById('ui-player-name').innerText = `${playerState.nation}小将：${playerState.name}`;
        switchScreen('screen-game');
        
        // 发送开局指令给 AI
        const initPrompt = `你是一个深度的足球文字RPG游戏引擎。
        玩家设定：姓名【${playerState.name}】，国籍【${playerState.nation}】，位置【${playerState.position}】。核心能力：速度${playerState.pac}，射门${playerState.sho}，身体${playerState.phy}。
        当前节点：这是玩家职业生涯的第一天，正在参加欧洲某二级联赛球队的试训对抗赛。
        请生成一段引人入胜的开场实况剧情（约80字），并提供3个不同风格的应对选项。
        
        你的回复必须严格按照以下格式（包含特殊符号以便前端解析）：
        【剧情】
        (这里写你的剧情或实况解说)
        【选项A】(动作描述，例如：利用速度强行突破)
        【选项B】(动作描述，例如：背身拿球寻找对抗)
        【选项C】(动作描述，例如：冷静观察传给队友)`;

        callAI(initPrompt);
    }

    // 2. 玩家点击了某个动态选项，进入下一循环
    function chooseOption(optionText) {
        // 记录历史，让故事连贯
        playerState.history.push(`玩家选择了：${optionText}`);
        // 限制记忆长度，防止 token 爆掉
        if(playerState.history.length > 5) playerState.history.shift(); 

        const dynamicPrompt = `你是一个深度的足球文字RPG游戏引擎。
        玩家【${playerState.name}】(${playerState.position})，属性：速度${playerState.pac}/射门${playerState.sho}/身体${playerState.phy}。
        近期事件记忆：${playerState.history.join(" -> ")}。
        基于玩家刚做出的选择：【${optionText}】，请进行暗骰判定（考虑他的属性优势/劣势），生成一段激情或充满挫折的后续赛场实况，然后紧接着给出下一步的3个面临的突发选项或日常抉择。
        
        你的回复必须严格按照以下格式：
        【剧情】
        (这里写剧情或解说，判定刚刚选择的结果，并引出新的危机或机遇)
        【选项A】(动作或决策描述)
        【选项B】(动作或决策描述)
        【选项C】(动作或决策描述)`;

        callAI(dynamicPrompt);
    }

    // 3. 核心通讯机制：呼叫 Netlify 后端，解析 AI 回复
    async function callAI(promptText) {
        const logPanel = document.getElementById('story-log');
        const optionsContainer = document.getElementById('dynamic-options');
        const loader = document.getElementById('loading');

        // 清空旧选项，显示加载中
        optionsContainer.innerHTML = '';
        loader.classList.add('active');

        try {
            const response = await fetch('/.netlify/functions/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
            
            const data = await response.json();
            loader.classList.remove('active');

            if(data.message) {
                parseAndRender(data.message, logPanel, optionsContainer);
            } else {
                logPanel.innerHTML += `<br><br><span style="color: #ef4444;">[AI引擎连接超时，世界线坍塌...]</span>`;
            }
        } catch (error) {
            loader.classList.remove('active');
            logPanel.innerHTML += `<br><br><span style="color: #ef4444;">[网络中断，无法获取系统指令。]</span>`;
        }
    }

    // 4. 解析 AI 按格式返回的文本，把它们变成真正的按钮
    function parseAndRender(aiText, logPanel, optionsContainer) {
        // 简单正则拆解 AI 输出的内容
        const storyMatch = aiText.match(/【剧情】([\s\S]*?)(?=【选项A】)/);
        const optAMatch = aiText.match(/【选项A】(.*)/);
        const optBMatch = aiText.match(/【选项B】(.*)/);
        const optCMatch = aiText.match(/【选项C】(.*)/);

        if (storyMatch) {
            // 用打字机效果或者直接追加剧情文本
            const storyText = storyMatch[1].trim();
            logPanel.innerHTML += `<br><br><span style="color: var(--accent-gold);">[赛事推演]</span><br>${storyText}`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // 动态创建按钮
        if (optAMatch) createButton(optAMatch[1].trim(), optionsContainer);
        if (optBMatch) createButton(optBMatch[1].trim(), optionsContainer);
        if (optCMatch) createButton(optCMatch[1].trim(), optionsContainer);
    }

    // 辅助工具：生成单个 HTML 按钮并绑定事件
    function createButton(text, container) {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = `👉 ${text}`;
        btn.onclick = () => {
            // 点击后按钮置灰，防止重复提交
            Array.from(container.children).forEach(b => b.disabled = true);
            const logPanel = document.getElementById('story-log');
            logPanel.innerHTML += `<br><br><span style="color: var(--accent-blue);">👤 你的决断：${text}</span>`;
            chooseOption(text);
        };
        container.appendChild(btn);
    }
</script>

</body>
</html>
