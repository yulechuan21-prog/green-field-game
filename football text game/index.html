<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>绿茵纪元：真实模拟</title>
<style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --green: #10b981; --gold: #fbbf24; --border: #334155; }
    body { font-family: 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
    .screen { width: 100%; max-width: 400px; height: 100%; display: none; flex-direction: column; background: var(--bg); position: relative; }
    .screen.active { display: flex; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .top-bar { background: rgba(15, 23, 42, 0.95); padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; text-align: center; }
    .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-top: 5px; }
    
    .content { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .log-panel { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: monospace; line-height: 1.6; font-size: 14px; min-height: 60vh; overflow-y: auto; }
    
    /* 剧情卡片与属性框 */
    .story-block { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); }
    .attr-update { color: var(--gold); font-size: 12px; margin-top: 5px; }
    
    .btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 8px; text-align: left; font-size: 14px; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px; }
    .btn:hover:not(:disabled) { border-color: var(--green); background: rgba(16,185,129,0.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .input-box { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; }
    
    #loader { display: none; text-align: center; color: var(--green); font-weight: bold; padding: 10px; }
</style>
</head>
<body>

<div id="screen-setup" class="screen active">
    <div class="top-bar"><h3 style="margin:0; color: var(--gold);">📝 新星建档</h3></div>
    <div class="content">
        <label>球员姓名</label>
        <input class="input-box" id="p-name" value="余乐川">
        
        <label>起始年份 (2010-2026，决定历史事件)</label>
        <input class="input-box" type="number" id="p-year" value="2010">
        
        <label>场上位置</label>
        <select class="input-box" id="p-pos">
            <option>锋线杀手 (高PAC/SHO)</option>
            <option>中场指挥官 (高PAS/DRI)</option>
            <option>铁血后卫 (高DEF/PHY)</option>
        </select>
        
        <label>天赋词条 (影响判定概率)</label>
        <select class="input-box" id="p-trait">
            <option>大心脏 (关键时刻成功率+10%)</option>
            <option>刺头 (易得牌但涨粉快)</option>
            <option>玻璃人 (易受伤但成长快)</option>
        </select>

        <button class="btn" style="background: var(--green); color: #000; text-align: center; font-weight: bold;" onclick="startGame()">正式签约，踏上绿茵场 ⚽</button>
    </div>
</div>

<div id="screen-game" class="screen">
    <div class="top-bar">
        <div style="font-weight: bold; font-size: 16px;" id="ui-name">球员名</div>
        <div class="status-bar">
            <span id="ui-date">📅 2010年 7月 第1周</span>
            <span id="ui-money" style="color: var(--gold);">💰 €500</span>
        </div>
    </div>
    
    <div class="content" style="padding-bottom: 30px;">
        <div class="log-panel" id="log-panel">
            <div style="color: var(--gold); text-align: center;">[系统启动，正在生成属于你的平行宇宙...]</div>
        </div>

        <div id="loader">🔄 AI 主教练正在推演世界线...</div>

        <div id="options-container"></div>
    </div>
</div>

<script>
    // 核心：玩家全局状态机 (State Machine)
    let state = {
        name: '', year: 2010, month: 7, week: 1, pos: '', trait: '',
        money: 500, rating: 6.0, 
        stats: { PAC: 60, SHO: 55, PAS: 55, DRI: 55, DEF: 40, PHY: 60 },
        context: "这是你加入球队的第一周，即将进行青训营的内部选拔赛。"
    };

    function updateUI() {
        document.getElementById('ui-name').innerText = state.name;
        document.getElementById('ui-date').innerText = `📅 ${state.year}年 ${state.month}月 第${state.week}周`;
        document.getElementById('ui-money').innerText = `💰 €${state.money}`;
    }

    // 时间流逝机制
    function advanceTime() {
        state.week++;
        if(state.week > 4) { state.week = 1; state.month++; }
        if(state.month > 12) { state.month = 1; state.year++; }
        updateUI();
    }

    function startGame() {
        state.name = document.getElementById('p-name').value;
        state.year = parseInt(document.getElementById('p-year').value);
        state.pos = document.getElementById('p-pos').value;
        state.trait = document.getElementById('p-trait').value;
        
        document.getElementById('screen-setup').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        updateUI();
        
        // 初次呼叫大模型
        generateNextTurn("系统开局初始化");
    }

    async function generateNextTurn(playerChoice) {
        const logPanel = document.getElementById('log-panel');
        const optionsContainer = document.getElementById('options-container');
        const loader = document.getElementById('loader');

        // 清空选项，显示加载
        optionsContainer.innerHTML = '';
        loader.style.display = 'block';

        // 记录玩家的选择，追加到屏幕上
        if(playerChoice !== "系统开局初始化") {
            logPanel.innerHTML += `<div style="color: var(--green); margin: 15px 0;">👉 你选择了：${playerChoice}</div>`;
            advanceTime(); // 每次玩家做出重大决策，时间推移一周
        }

        // 构建极其硬核的 GDD 系统提示词
        const promptText = `
你是一个硬核的足球RPG游戏文字引擎(DM)。
【当前玩家状态】
姓名：${state.name} | 年份：${state.year}年${state.month}月 | 位置：${state.pos} | 特质：${state.trait}
身价存款：€${state.money}
核心属性(满分99)：速度PAC(${state.stats.PAC})，射门SHO(${state.stats.SHO})，传球PAS(${state.stats.PAS})，身体PHY(${state.stats.PHY})
近期处境摘要：${state.context}
玩家刚刚做出的选择：【${playerChoice}】

【你的任务】
1. 根据玩家的选择进行判定。如果选择需要属性判定（如强行突破看PAC），请根据他的属性生成合理的结果（成功或失败）。
2. 推进剧情发展。这回合可能是：一场激烈的比赛关键时刻、一次日常高强度训练、一次更衣室的争吵事件、或者转会窗的报价。请根据年份加入真实历史背景（如2010是Tiki-Taka，2020是疫情空场，2018有VAR）。
3. 给出3个全新的、截然不同的选项供玩家下一步决策。选项必须标注主要判定的属性。

【必须严格按照以下格式输出，不能有任何多余前缀，用于程序解析】：
||剧情||
（在这里写不少于100字的生动剧情推演、赛况播报或突发事件。请结语描述接下来面临的新危机或抉择点）
||状态更新||
（用一句话说明数值的微小变化，例如：存款+500，PAC+1，赛后评分 7.5分）
||选项A||[判定: PAC速度] (具体动作描述，如：利用速度强吃后卫)
||选项B||[判定: PHY身体] (具体动作描述，如：背身护球等待接应)
||选项C||[判定: 高风险] (具体动作描述，如：向裁判抱怨怒吼)`;

        try {
            const response = await fetch('/.netlify/functions/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
            const data = await response.json();
            
            loader.style.display = 'none';
            if(data.message) {
                parseAndRender(data.message);
            } else {
                logPanel.innerHTML += `<div style="color: red;">[AI引擎连接超时，请重试...]</div>`;
            }
        } catch (error) {
            loader.style.display = 'none';
            logPanel.innerHTML += `<div style="color: red;">[系统网络中断。]</div>`;
        }
    }

    // 解析 AI 按格式返回的文本
    function parseAndRender(aiText) {
        const logPanel = document.getElementById('log-panel');
        const optionsContainer = document.getElementById('options-container');

        // 使用正则拆解块内容
        const storyMatch = aiText.match(/\|\|剧情\|\|([\s\S]*?)(?=\|\|状态更新\|\|)/);
        const statusMatch = aiText.match(/\|\|状态更新\|\|([\s\S]*?)(?=\|\|选项A\|\|)/);
        const optA = aiText.match(/\|\|选项A\|\|(.*)/);
        const optB = aiText.match(/\|\|选项B\|\|(.*)/);
        const optC = aiText.match(/\|\|选项C\|\|(.*)/);

        if (storyMatch) {
            let storyBlock = `<div class="story-block">${storyMatch[1].trim()}`;
            if (statusMatch) {
                storyBlock += `<div class="attr-update">📈 系统结算：${statusMatch[1].trim()}</div>`;
                // 这里可以写正则去更新 state 里的真实数值，比如匹配金钱增加
                state.context = storyMatch[1].substring(0, 50) + "..."; // 截取一部分作为下回合记忆
            }
            storyBlock += `</div>`;
            logPanel.innerHTML += storyBlock;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // 渲染全新按钮
        if (optA) createButton(optA[1].trim(), optionsContainer);
        if (optB) createButton(optB[1].trim(), optionsContainer);
        if (optC) createButton(optC[1].trim(), optionsContainer);
    }

    function createButton(text, container) {
        const btn = document.createElement('button');
        btn.className = 'btn';
        // 解析选项里的 [判定] 和 具体动作
        const tagMatch = text.match(/(\[.*?\])(.*)/);
        if(tagMatch) {
            btn.innerHTML = `<span style="color:var(--gold); font-weight:bold; font-size:12px;">${tagMatch[1]}</span><span>${tagMatch[2]}</span>`;
        } else {
            btn.innerText = text;
        }
        
        btn.onclick = () => {
            Array.from(container.children).forEach(b => b.disabled = true);
            generateNextTurn(text);
        };
        container.appendChild(btn);
    }
</script>

</body>
</html>
