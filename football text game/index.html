<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>绿茵纪元：2010-2026</title>
<style>
    :root {
        --bg-dark: #0f172a;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-sub: #94a3b8;
        --accent-green: #10b981;
        --accent-gold: #fbbf24;
        --accent-blue: #3b82f6;
        --border-color: #334155;
    }
    body {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background-color: #000;
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden; 
    }
    .screen {
        width: 100%;
        max-width: 375px;
        height: 100%;
        max-height: 812px;
        background-color: var(--bg-dark);
        border: 1px solid var(--border-color);
        display: none; 
        flex-direction: column;
        position: relative;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    .screen.active { display: flex; }
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    .top-bar {
        background: rgba(15, 23, 42, 0.95);
        padding: 15px;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(5px);
    }
    .time-line { font-size: 14px; color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; }
    .status-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-sub); }

    .feed-container { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 15px; }
    .card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-left: 4px solid var(--accent-green);
        border-radius: 8px;
        padding: 15px;
    }
    .card.info { border-left-color: var(--accent-blue); }
    .card-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .card-content { font-size: 14px; line-height: 1.6; color: var(--text-main); }
    
    /* 文字面板特化（比赛实况视窗） */
    .text-panel { 
        font-family: 'Courier New', monospace; 
        line-height: 1.8; 
        font-size: 15px; 
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #334155;
        min-height: 200px;
        max-height: 400px; /* 限制高度，内部滚动 */
        overflow-y: auto;
    }
    .text-panel::-webkit-scrollbar { width: 4px; }
    .text-panel::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 2px; }
    
    .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .btn {
        background-color: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 15px;
        border-radius: 8px;
        text-align: left;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .btn:hover:not(:disabled), .btn.active:not(:disabled) { background-color: rgba(16, 185, 129, 0.1); border-color: var(--accent-green); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; } /* 禁用状态 */
    .btn-chance { color: var(--accent-green); font-weight: bold; }
    .btn-cost { color: var(--accent-gold); font-size: 12px; }

    .bottom-nav {
        display: flex;
        justify-content: space-around;
        padding: 15px;
        background: var(--card-bg);
        border-top: 1px solid var(--border-color);
        position: sticky;
        bottom: 0;
    }
    .nav-item { color: var(--text-sub); font-size: 12px; text-align: center; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
    .nav-item.active { color: var(--accent-green); }
</style>
</head>
<body>

<div id="screen-setup" class="screen">
    <div class="top-bar" style="text-align: center;">人物建档</div>
    <div class="feed-container" style="justify-content: center;">
        <div class="card info">
            <div class="card-content">
                <span style="color: var(--accent-gold);">[系统启动...]</span><br><br>
                “2010年，南非的呜呜祖拉声刚刚平息。”<br>
                “而你，距离实现职业梦想，只差一份正式合同...”
            </div>
        </div>
        <div class="btn-group">
            <button class="btn active" onclick="switchScreen('screen-match')" style="justify-content: center; font-size: 16px; font-weight: bold; color: var(--accent-green);">进入绿茵场试训</button>
        </div>
    </div>
</div>

<div id="screen-match" class="screen active">
    <div class="top-bar" style="text-align: center;">
        <div style="font-size: 20px; font-weight: bold;">蓝队 1 - 0 红队</div>
        <div class="time-line" style="margin-top: 5px;">⏱ 64:12 | 🔋 85%</div>
    </div>
    
    <div class="feed-container">
        <div id="match-log" class="text-panel">
            <span style="color: var(--accent-gold);">【关键事件触发！】</span><br>
            对方造了一个越位陷阱，但边裁并未举旗！你敏锐地反越位成功，单刀赴会！门将正在弃门出击！<br>
        </div>
        
        <div class="btn-group" id="action-buttons">
            <button class="btn" onclick="executeAction('爆射近角', this)">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <span>[爆射近角] 判定: SHO射门</span>
                    <span class="btn-cost">门将尚未封死角度，大力出奇迹！</span>
                </div>
                <span class="btn-chance">60%</span>
            </button>
            <button class="btn active" onclick="executeAction('钟摆过人', this)">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <span>[钟摆过人] 判定: DRI盘带</span>
                    <span class="btn-cost">高风险，极高收益，评分暴涨</span>
                </div>
                <span class="btn-chance">35%</span>
            </button>
            <button class="btn" onclick="executeAction('横传中路', this)">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <span>[横传中路] 判定: PAS传球</span>
                    <span class="btn-cost">队友正在跟进，传过去就是打空门</span>
                </div>
                <span class="btn-chance">85%</span>
            </button>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item"><span>🔙</span>放弃比赛</div>
    </div>
</div>

<script>
    // 界面切换函数
    function switchScreen(targetScreenId) {
        document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
        document.getElementById(targetScreenId).classList.add('active');
    }

    // 获取比赛日志的容器
    const matchLog = document.getElementById('match-log');
    const buttonsContainer = document.getElementById('action-buttons');

    // 酷炫的打字机效果函数
    function typeWriter(text, element, speed = 30) {
        return new Promise((resolve) => {
            let i = 0;
            element.innerHTML += '<br><br><span style="color: var(--accent-green);">⚽ </span>';
            const textSpan = document.createElement('span');
            textSpan.style.color = '#fff';
            element.appendChild(textSpan);
            
            function type() {
                if (i < text.length) {
                    textSpan.innerText += text.charAt(i); // 逐字添加
                    i++;
                    // 每次打字都自动滚动到最底部
                    element.scrollTop = element.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    resolve();
                }
            }
            type();
        });
    }

    // 执行玩家动作的核心函数
    async function executeAction(playerAction, clickedButton) {
        // 1. 禁用所有按钮，防止玩家连点导致网络错乱
        const allButtons = buttonsContainer.querySelectorAll('.btn');
        allButtons.forEach(btn => btn.disabled = true);

        // 2. 在日志面板打印玩家的选择
        matchLog.innerHTML += `<br><br><span style="color: var(--accent-blue);">👉 你选择了：[${playerAction}]</span>`;
        matchLog.innerHTML += `<br><span style="color: var(--text-sub); font-size: 13px;">系统暗骰中，正在连接云端解说员...</span>`;
        matchLog.scrollTop = matchLog.scrollHeight; // 滚动到底部

        // 3. 构建提示词
        const promptText = `你现在是文字策略游戏《绿茵纪元》的足球解说员。当前情况：玩家是一名前锋。玩家做出了动作：【${playerAction}】。请用激情的语气写一段50字以内的赛场实况播报。直接输出解说词正文，不要有任何前缀。`;

        try {
            // 4. 发起真实的网络请求
            const response = await fetch('/.netlify/functions/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
            
            const data = await response.json();
            
            if(data.message) {
                // 5. 将生硬的弹窗替换为打字机动画！
                await typeWriter(data.message, matchLog, 40);
                
                // 6. 互动继续：解说完成后，可以在这里更新按钮选项（这里作为演示，恢复按钮可点击）
                matchLog.innerHTML += `<br><br><span style="color: var(--accent-gold);">[回合结束。比赛继续运转...]</span>`;
                matchLog.scrollTop = matchLog.scrollHeight;
            } else {
                matchLog.innerHTML += `<br><br><span style="color: #ef4444;">[解说员麦克风故障...]</span>`;
            }

        } catch (error) {
            console.error("请求失败", error);
            matchLog.innerHTML += `<br><br><span style="color: #ef4444;">[网络中断，VAR失去信号。]</span>`;
        } finally {
            // 无论成功失败，恢复按钮状态（真实游戏中，这里应该替换为下一回合的新选项）
            allButtons.forEach(btn => btn.disabled = false);
        }
    }
</script>

</body>
</html>
